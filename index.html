<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pengumuman Kelulusan</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f3f5f9;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
}

.card{
    width:100%;
    max-width:500px;
    background:#fff;
    border-radius:18px;
    padding:28px;
    text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
    border-top:5px solid #2451d1;
}

.icon-box{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:#eef3fb;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}

.icon-box i{
    font-size:40px;
    color:#2451d1;
}

h1{
    color:#081b44;
    font-size:24px;
    margin-bottom:6px;
    font-weight:700;
}

h2{
    color:#2451d1;
    font-size:16px;
    margin-bottom:25px;
}

.desc{
    color:#667085;
    font-size:15px;
    line-height:1.6;
    margin-bottom:25px;
}

.countdown{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:8px;
    margin-bottom:20px;
}

.time-box{
    min-width:70px;
}

.number{
    background:#f8fafc;
    border:1px solid #dbe0ea;
    border-radius:10px;
    padding:8px;
    font-size:34px;
    font-weight:700;
    color:#10254f;
}

.label{
    margin-top:8px;
    font-size:12px;
    font-weight:600;
    color:#4b5563;
}

.separator{
    font-size:28px;
    font-weight:bold;
    color:#9ca3af;
    margin-top:10px;
}

.note{
    color:#98a2b3;
    font-size:13px;
}

.error-box{
    display:none;
    background:#fff5f5;
    border:2px solid #ef4444;
    border-radius:12px;
    padding:22px;
}

.error-icon{
    font-size:42px;
    color:#dc2626;
    margin-bottom:15px;
}

.error-title{
    font-size:22px;
    font-weight:700;
    color:#b91c1c;
    margin-bottom:15px;
}

.error-message{
    font-size:18px;
    color:#7f1d1d;
    min-height:30px;
    font-weight:600;
}

.loading-dots::after{
    content:"";
    animation:dots 1.5s infinite;
}

@keyframes dots{
    0%{content:"";}
    33%{content:".";}
    66%{content:"..";}
    100%{content:"...";}
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

.error-box{
    animation:pulse 1.5s infinite;
}

@media(max-width:600px){

    .card{
        max-width:380px;
        padding:20px;
    }

    .icon-box{
        width:75px;
        height:75px;
    }

    .icon-box i{
        font-size:32px;
    }

    h1{
        font-size:20px;
    }

    h2{
        font-size:14px;
    }

    .desc{
        font-size:14px;
    }

    .time-box{
        min-width:58px;
    }

    .number{
        font-size:24px;
    }

    .separator{
        font-size:22px;
    }

    .error-title{
        font-size:18px;
    }

    .error-message{
        font-size:15px;
    }
}
</style>
</head>
<body>

<div class="card">

    <div class="icon-box">
        <i class="fa-regular fa-clock"></i>
    </div>

    <h1>PENGUMUMAN KELULUSAN</h1>
    <h2>SMP NEGERI 13 KENDARI</h2>

    <div class="desc">
        Portal pencarian data kelulusan akan dibuka secara serentak dalam waktu:
    </div>

    <div id="countdownContainer">

        <div class="countdown">

            <div class="time-box">
                <div class="number" id="days">00</div>
                <div class="label">HARI</div>
            </div>

            <div class="separator">:</div>

            <div class="time-box">
                <div class="number" id="hours">00</div>
                <div class="label">JAM</div>
            </div>

            <div class="separator">:</div>

            <div class="time-box">
                <div class="number" id="minutes">00</div>
                <div class="label">MENIT</div>
            </div>

            <div class="separator">:</div>

            <div class="time-box">
                <div class="number" id="seconds">00</div>
                <div class="label">DETIK</div>
            </div>

        </div>

        <div class="note">
            *Sistem akan terbuka otomatis, harap tidak menutup halaman ini.
        </div>

    </div>

    <div id="errorBox" class="error-box">

        <div class="error-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <div class="error-title">
            Gangguan Server
        </div>

        <div class="error-message" id="errorMessage">
            Menghubungkan ke server...
        </div>

    </div>

</div>

<script>

// =========================================================================
// ATUR TANGGAL DAN WAKTU RILIS DI SINI
// =========================================================================
const DEFAULT_DATE = "2026-06-02T20:00:00+08:00";

const targetDate = new Date(DEFAULT_DATE);

const countdownContainer = document.getElementById("countdownContainer");
const errorBox = document.getElementById("errorBox");
const errorMessage = document.getElementById("errorMessage");

const messages = [
    "Menghubungkan ke server...",
    "Mengambil data kelulusan...",
    "Memeriksa status layanan...",
    "Server tidak merespons...",
    "Memuat data siswa...",
    "Jaringan tidak stabil...",
    "Memproses permintaan...",
    "Maaf, Jaringan sedang sibuk...",
    "Silakan coba beberapa saat lagi...",
    "Menghubungkan ulang ke server..."
];

function updateCountdown(){

    const now = new Date().getTime();
    const distance = targetDate.getTime() - now;

    if(distance <= 0){

        clearInterval(timer);

        countdownContainer.style.display = "none";
        errorBox.style.display = "block";

        let index = 0;

        errorMessage.textContent = messages[index];

        setInterval(() => {
            index++;
            if(index >= messages.length){
                index = 0;
            }

            errorMessage.style.opacity = "0";

            setTimeout(() => {
                errorMessage.textContent = messages[index];
                errorMessage.style.opacity = "1";
            },200);

        },2000);

        return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("days").textContent =
        String(days).padStart(2,"0");

    document.getElementById("hours").textContent =
        String(hours).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(minutes).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(seconds).padStart(2,"0");
}

updateCountdown();

const timer = setInterval(updateCountdown,1000);

</script>

</body>
</html>
