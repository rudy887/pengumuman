<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Kelulusan</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    background:#f4f6fb;
    font-family:Segoe UI,sans-serif;
}

.card{
    width:100%;
    max-width:480px;
    background:#fff;
    border-radius:18px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    border-top:5px solid #2451d1;
}

.icon-box{
    width:80px;
    height:80px;
    margin:auto;
    border-radius:50%;
    background:#edf3ff;
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:18px;
}

.icon-box i{
    font-size:34px;
    color:#2451d1;
}

h1{
    font-size:24px;
    color:#081b44;
    margin-bottom:5px;
}

h2{
    font-size:15px;
    color:#2451d1;
    margin-bottom:20px;
}

.desc{
    color:#667085;
    line-height:1.5;
    margin-bottom:25px;
    font-size:14px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:6px;
    margin-bottom:20px;
}

.time-box{
    min-width:60px;
}

.number{
    background:#f8fafc;
    border:1px solid #dce3ee;
    border-radius:10px;
    padding:8px;
    font-size:30px;
    font-weight:700;
    color:#0f224f;
}

.label{
    margin-top:6px;
    font-size:11px;
    font-weight:600;
    color:#667085;
}

.separator{
    font-size:24px;
    margin-top:8px;
    color:#9ca3af;
    font-weight:bold;
}

.note{
    font-size:12px;
    color:#98a2b3;
}

.error-box{
    display:none;
    background:#fff5f5;
    border:2px solid #ef4444;
    border-radius:12px;
    padding:20px;
    animation:pulse 1.5s infinite;
}

.error-icon{
    font-size:42px;
    color:#dc2626;
    margin-bottom:12px;
}

.error-title{
    font-size:22px;
    font-weight:700;
    color:#b91c1c;
    margin-bottom:15px;
}

.error-message{
    min-height:50px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-size:18px;
    font-weight:600;
    color:#7f1d1d;
    transition:opacity .3s ease;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.02);}
    100%{transform:scale(1);}
}

@media(max-width:480px){

    .card{
        padding:18px;
    }

    .time-box{
        min-width:50px;
    }

    .number{
        font-size:22px;
    }

    .separator{
        font-size:18px;
    }

    h1{
        font-size:20px;
    }

    .error-title{
        font-size:18px;
    }

    .error-message{
        font-size:15px;
    }
}

</style>
</head>
<body>

<div class="card">

    <div class="icon-box">
        <i class="fa-regular fa-clock"></i>
    </div>

    <h1>PENGUMUMAN KELULUSAN</h1>

    <h2>SMP NEGERI 13 KENDARI</h2>

    <div class="desc">
        Portal pencarian data kelulusan akan dibuka secara serentak dalam waktu:
    </div>

    <div id="countdownContainer">

        <div class="countdown">

            <div class="time-box">
                <div class="number" id="days">00</div>
                <div class="label">HARI</div>
            </div>

            <div class="separator">:</div>

            <div class="time-box">
                <div class="number" id="hours">00</div>
                <div class="label">JAM</div>
            </div>

            <div class="separator">:</div>

            <div class="time-box">
                <div class="number" id="minutes">00</div>
                <div class="label">MENIT</div>
            </div>

            <div class="separator">:</div>

            <div class="time-box">
                <div class="number" id="seconds">00</div>
                <div class="label">DETIK</div>
            </div>

        </div>

        <div class="note">
            *Sistem akan terbuka otomatis.
        </div>

    </div>

    <div id="errorBox" class="error-box">

        <div class="error-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <div class="error-title">
            Gangguan Server
        </div>

        <div id="errorMessage" class="error-message">
            Menghubungkan ke server...
        </div>

    </div>

</div>

<script>

// ============================================================
// PENGATURAN WAKTU
// ============================================================

const DEFAULT_DATE = "2026-06-02T19:29:00+08:00";
const targetDate = new Date(DEFAULT_DATE);

const messages = [
    "Menghubungkan ke server...",
    "Mengambil data kelulusan...",
    "Memverifikasi data siswa...",
    "Memuat informasi kelulusan...",
    "Server tidak merespons...",
    "Jaringan tidak stabil...",
    "Menghubungkan ulang ke server...",
    "Maaf, Jaringan sedang sibuk...",
    "Silakan coba beberapa saat lagi...",
    "Memproses permintaan..."
];

const countdownContainer =
document.getElementById("countdownContainer");

const errorBox =
document.getElementById("errorBox");

const errorMessage =
document.getElementById("errorMessage");

let errorRunning = false;

function showServerError(){

    if(errorRunning) return;

    errorRunning = true;

    countdownContainer.style.display = "none";
    errorBox.style.display = "block";

    let index = 0;

    errorMessage.textContent = messages[index];

    setInterval(() => {

        index = (index + 1) % messages.length;

        errorMessage.style.opacity = "0";

        setTimeout(() => {

            errorMessage.textContent =
            messages[index];

            errorMessage.style.opacity = "1";

        },300);

    },2000);
}

function updateCountdown(){

    const distance =
        targetDate.getTime() - Date.now();

    if(distance <= 0){

        clearInterval(timer);

        showServerError();

        return;
    }

    const days =
        Math.floor(distance / (1000*60*60*24));

    const hours =
        Math.floor(
            (distance % (1000*60*60*24))
            /(1000*60*60)
        );

    const minutes =
        Math.floor(
            (distance % (1000*60*60))
            /(1000*60)
        );

    const seconds =
        Math.floor(
            (distance % (1000*60))
            /1000
        );

    document.getElementById("days").textContent =
        String(days).padStart(2,"0");

    document.getElementById("hours").textContent =
        String(hours).padStart(2,"0");

    document.getElementById("minutes").textContent =
        String(minutes).padStart(2,"0");

    document.getElementById("seconds").textContent =
        String(seconds).padStart(2,"0");
}

// ============================================================
// CEK SAAT HALAMAN DIBUKA
// ============================================================

if(Date.now() >= targetDate.getTime()){

    showServerError();

}else{

    updateCountdown();

    var timer =
        setInterval(updateCountdown,1000);
}
</script>

</body>
</html>
